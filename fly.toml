app = "kie-agent-bot"
primary_region = "lhr"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "kie_auth_data"
  destination = "/app/auth_info"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
